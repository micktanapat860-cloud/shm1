<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHM Simulator</title>
<link rel="stylesheet" href="main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Athiti:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
    <nav class="navbar">
  <span class="nav-brand">
    <i class="ti ti-wave-sine"></i> SHM Simulator
  </span>
  <div class="nav-links">
    <a href="index.html" class="active">Simulator</a>
    <a href="page2.html">make by</a>
  </div>
  <div class="nav-actions">
    <button class="btn-icon" title="Reset">&#x21BA;</button>
    <button class="btn-icon" title="Settings">&#9881;</button>
  </div>
</nav>
<canvas id="sim" width="800" height="250"></canvas>

<div class="controls">
    <div>
        <label class="charm-regular">Mass มวล</label>
        <div class="input-wrap">
            <input type="number" id="mass" value="5" step="0.1">
            <span class="unit-badge">kg</span>
        </div>
        <div class="tooltip">
            <div class="tt-formula">T = 2π√(m/k)</div>
            <div class="tt-desc">มวลของวัตถุ มากขึ้น → คาบยาวขึ้น</div>
        </div>
    </div>
    <div>
        <label class="charm-regular">Spring Constant k</label>
        <div class="input-wrap">
            <input type="number" id="spring" value="10" step="0.1">
            <span class="unit-badge">N/m</span>
        </div>
        <div class="tooltip">
            <div class="tt-formula">F = −kx</div>
            <div class="tt-desc">ความแข็งสปริง มากขึ้น → คาบสั้นลง</div>
        </div>
    </div>
    <div>
        <label class="charm-regular">Amplitude แอมพลิจูด</label>
        <div class="input-wrap">
            <input type="number" id="amp" value="100" step="1">
            <span class="unit-badge">px</span>
        </div>
        <div class="tooltip">
            <div class="tt-formula">x(t) = A cos(ωt)</div>
            <div class="tt-desc">ระยะกระจัดสูงสุด ไม่มีผลต่อคาบ</div>
        </div>
    </div>
    <div>
        <label class="charm-regular">Damping β</label>
        <div class="input-wrap">
            <input type="number" id="custom" value="0" step="0.01">
            <span class="unit-badge">β</span>
        </div>
        <div class="tooltip">
            <div class="tt-formula">Ae⁻ᵝᵗ cos(ωt)</div>
            <div class="tt-desc">β = 0 คือ SHM อุดมคติ มากขึ้น → หน่วงเร็วขึ้น</div>
        </div>
    </div>
</div>
<div class="bottom-bar">
    <span>กลุ่ม อ้ายมา — 4.5 คน</span>
</div>
<script src="main.js"></script>
</body>
</html>

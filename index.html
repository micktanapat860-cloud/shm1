<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHM Simulator</title>
<link rel="stylesheet" href="main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Athiti:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    
    <nav class="navbar">
  <span class="nav-brand">
    <i class="ti ti-wave-sine"></i> SHM Simulator
  </span>
  <div class="nav-links">
    <a href="index.html" class="active">Simulator</a>
    <a href="page2.html">make by</a>
  </div>
  <div class="nav-actions">
    <button class="btn-icon" title="Reset">&#x21BA;</button>
    <button class="btn-icon" title="Settings">&#9881;</button>
  </div>
</nav>
<canvas id="sim" width="800" height="250"></canvas>

<div class="controls">
    <div>
        <label class="charm-regular">Mass มวล(kg)</label>
        <input type="number" id="mass" value="5" step="0.1">
    </div>
    <div>
        <label class="charm-regular">Spring Constant k ค่าคงที่สปริง k(N/m)</label>
        <input type="number" id="spring" value="10" step="0.1">
    </div>
    <div>
        <label class="charm-regular">Amplitude แอมพลิจูด (px)</label>
        <input type="number" id="amp" value="100" step="1">
    </div>
    <div>
        <label class="charm-regular">Custom กำหนดเอง β</label>
        <input type="number" id="custom" value="0" step="0.01">
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
